<div id="theme-switch-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; align-items: center; background: rgba(128,128,128,0.1); padding: 10px; border-radius: 50px; backdrop-filter: blur(5px); border: 1px solid rgba(128,128,128,0.3);">
    <span style="margin-right: 10px; font-family: sans-serif; font-size: 12px; font-weight: bold;">TEMA</span>
    <label class="switch" style="position: relative; display: inline-block; width: 40px; height: 20px;">
        <input type="checkbox" id="theme-toggle" style="opacity: 0; width: 0; height: 0;">
        <span class="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px;"></span>
    </label>
</div>

<style>
    .slider:before {
        position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px;
        background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #2196F3; }
    input:checked + .slider:before { transform: translateX(20px); }
</style>

<script>
    const toggle = document.getElementById('theme-toggle');
    const currentPage = window.location.pathname.split("/").pop();

    // Configurar el estado inicial del switch basado en el nombre del archivo
    if (currentPage === "dark.html") {
        toggle.checked = true;
    }

    toggle.addEventListener('change', () => {
        if (toggle.checked) {
            window.location.href = "dark.html";
        } else {
            window.location.href = "light.html";
        }
    });
</script>
