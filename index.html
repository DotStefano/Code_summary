<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSummary - Select View</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #24292f;
        }

        h1 { margin-bottom: 8px; font-weight: 600; }
        p { margin-bottom: 32px; color: #57606a; }

        .button-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid rgba(27, 31, 36, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 150px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
        }

        /* Estilo Botón Light */
        .btn-light {
            background-color: #ffffff;
            color: #24292f;
        }

        /* Estilo Botón Dark */
        .btn-dark {
            background-color: #2d333b;
            color: #adbac7;
            border-color: #444c56;
        }

        .icon { font-size: 24px; }
    </style>
</head>
<body>

    <h1>CodeSummary</h1>
    <p>Selecciona el tema para el reporte de datos</p>

    <div class="button-container">
        <a href="light.html" class="btn btn-light">
            <span class="icon">☀️</span>
            <span>Light Mode</span>
        </a>

        <a href="dark.html" class="btn btn-dark">
            <span class="icon">🌙</span>
            <span>Dark Mode</span>
        </a>
    </div>

</body>
</html>
